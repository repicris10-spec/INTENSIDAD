<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANGIE_TELLEZ.exe — Sistema de Amor v∞</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap');
  :root {
    --green: #00ff88;
    --green-dim: #00cc66;
    --green-glow: #00ff8855;
    --dark: #020c05;
    --darker: #010804;
    --pink: #ff6eb4;
    --cyan: #00eeff;
    --gold: #ffd700;
    --red: #ff4444;
    --white: #e0ffe8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.13) 2px, rgba(0,0,0,0.13) 4px);
    pointer-events: none;
    z-index: 999;
  }
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 998;
  }

  /* ===== ACCESS GATE ===== */
  #access-gate {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--darker);
    z-index: 2000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    overflow: hidden;
  }

  /* ASCII Face */
  #ascii-face-container {
    margin-bottom: 24px;
    text-align: center;
    position: relative;
  }
  #ascii-face {
    display: block;
    opacity: 0;
    transition: opacity 1.2s ease;
    filter: drop-shadow(0 0 10px var(--green-dim));
    max-width: 320px;
    max-height: 260px;
    width: min(320px, 85vw);
    height: auto;
  }
  #ascii-face.visible { opacity: 1; }

  /* Scanning line over face */
  #scan-line {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.7;
    animation: scanDown 2.5s linear infinite;
    pointer-events: none;
  }
  @keyframes scanDown {
    0% { top: 0%; opacity: 0.8; }
    90% { top: 100%; opacity: 0.6; }
    100% { top: 100%; opacity: 0; }
  }

  /* Glitch on face */
  @keyframes faceGlitch {
    0%,92%,100% { filter: drop-shadow(0 0 8px var(--green-dim)); transform: translate(0); }
    93% { filter: drop-shadow(0 0 8px #ff00ff) hue-rotate(120deg); transform: translate(-2px,0); }
    94% { filter: drop-shadow(0 0 8px var(--cyan)); transform: translate(2px,0); }
    95% { filter: drop-shadow(0 0 8px var(--green-dim)); transform: translate(0); }
  }
  #ascii-face.visible { animation: faceGlitch 5s infinite; }

  /* ACCESS text above */
  .gate-label {
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.55rem, 1.5vw, 0.85rem);
    color: var(--green-dim);
    letter-spacing: 4px;
    margin-bottom: 6px;
    text-align: center;
  }
  .gate-title {
    font-family: 'VT323', monospace;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    color: var(--pink);
    text-shadow: 0 0 20px var(--pink);
    letter-spacing: 6px;
    text-align: center;
    margin-bottom: 20px;
    animation: pinkPulse 2s ease-in-out infinite;
  }
  @keyframes pinkPulse {
    0%,100% { text-shadow: 0 0 20px var(--pink); }
    50% { text-shadow: 0 0 40px var(--pink), 0 0 80px rgba(255,110,180,0.4); }
  }

  /* Password form */
  .gate-form {
    width: min(420px, 92vw);
    border: 1px solid var(--green-dim);
    padding: 22px;
    background: #010c06;
    position: relative;
    overflow: hidden;
  }
  .gate-form::before {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,255,136,0.04), transparent);
    animation: formSweep 3s ease-in-out infinite;
  }
  @keyframes formSweep { 0%{left:-100%} 100%{left:100%} }

  .gate-question {
    font-size: 0.82rem;
    color: var(--cyan);
    letter-spacing: 2px;
    margin-bottom: 14px;
    line-height: 1.6;
  }
  .gate-question::before { content: '◈ CLAVE: '; color: var(--green-dim); }

  .gate-input-wrap {
    display: flex; gap: 8px; align-items: center; margin-bottom: 14px;
  }
  .gate-input {
    flex: 1;
    background: var(--darker);
    border: 1px solid #003322;
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    padding: 10px 14px;
    outline: none;
    letter-spacing: 3px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .gate-input:focus { border-color: var(--green); box-shadow: 0 0 10px var(--green-glow); }
  .gate-input::placeholder { color: #004422; letter-spacing: 1px; }

  .gate-btn {
    background: transparent;
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 10px 16px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .gate-btn:hover { border-color: var(--green); background: rgba(0,255,136,0.08); box-shadow: 0 0 12px var(--green-glow); }

  .gate-status {
    font-size: 0.78rem;
    min-height: 1.4em;
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .gate-status.show { opacity: 1; }
  .gate-status.err { color: var(--red); }
  .gate-status.err::before { content: '[ERR] '; color: #880000; }
  .gate-status.ok { color: var(--green); }
  .gate-status.ok::before { content: '[OK] '; color: #006633; }

  /* Decoding animation */
  #decoding-overlay {
    display: none;
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--darker);
    z-index: 2100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }
  #decoding-overlay.active { display: flex; }
  .decode-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.8rem, 2.5vw, 1.2rem);
    color: var(--cyan);
    letter-spacing: 5px;
    text-shadow: 0 0 14px var(--cyan);
    animation: cyanBlink 0.6s step-end infinite;
  }
  @keyframes cyanBlink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .decode-lines {
    font-size: 0.75rem;
    color: var(--green-dim);
    letter-spacing: 2px;
    text-align: center;
    line-height: 2;
    max-width: 400px;
  }
  #decode-progress-bar {
    width: min(360px, 80vw);
    height: 4px;
    background: #001a08;
    border: 1px solid #003311;
    overflow: hidden;
  }
  #decode-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    width: 0%;
    transition: width 0.15s ease;
    box-shadow: 0 0 8px var(--green);
  }
  #decode-pct {
    font-size: 0.7rem;
    color: var(--green);
    letter-spacing: 3px;
  }

  /* BOOT */
  #boot-screen {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--darker);
    z-index: 1000;
    display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
  }
  #boot-screen.active { display: flex; }
  .boot-logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 900;
    color: var(--green);
    text-shadow: 0 0 30px var(--green), 0 0 60px var(--green-dim);
    letter-spacing: 8px;
    animation: flicker 3s infinite;
  }
  @keyframes flicker {
    0%,94%,96%,100% { opacity: 1; }
    95% { opacity: 0.3; }
  }
  .boot-sub { font-family: 'VT323', monospace; font-size: 1.3rem; color: var(--green-dim); letter-spacing: 4px; opacity: 0.7; }
  .boot-bar-container { width: min(400px,80vw); border: 1px solid var(--green-dim); height: 6px; background: #001a08; overflow: hidden; }
  .boot-bar { height: 100%; background: linear-gradient(90deg, var(--green-dim), var(--green)); width: 0%; animation: loadBar 3.2s ease-in-out forwards; box-shadow: 0 0 10px var(--green); }
  @keyframes loadBar { 0%{width:0%} 20%{width:30%} 50%{width:60%} 80%{width:85%} 100%{width:100%} }
  .boot-status { font-size: 0.75rem; color: var(--green-dim); opacity: 0.6; letter-spacing: 2px; }

  /* TERMINAL */
  #terminal { display: none; max-width: 900px; margin: 0 auto; padding: 20px; min-height: 100vh; position: relative; z-index: 1; }
  .terminal-header {
    border-bottom: 1px solid var(--green-dim);
    padding-bottom: 15px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  .terminal-title { font-family: 'Orbitron', monospace; font-size: clamp(0.7rem,2vw,1rem); color: var(--green); text-shadow: 0 0 10px var(--green); letter-spacing: 3px; }
  .terminal-dots { display: flex; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: #ff4444; box-shadow: 0 0 8px #ff4444; }
  .dot.yellow { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
  .dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }

  #output { min-height: 40vh; line-height: 1.9; }
  .line { display: block; opacity: 0; animation: fadeIn 0.08s forwards; }
  @keyframes fadeIn { to { opacity: 1; } }
  .prompt { color: var(--green); }
  .prompt::before { content: '❯ '; color: var(--green-dim); }
  .system { color: var(--green-dim); font-size: 0.85rem; }
  .system::before { content: '[SYS] '; color: #006633; }
  .info { color: var(--cyan); }
  .info::before { content: '[INFO] '; color: #007799; }
  .love { color: var(--pink); font-size: 1.05rem; }
  .love::before { content: '♥ '; }
  .highlight { color: var(--gold); font-family: 'VT323', monospace; font-size: 1.3rem; letter-spacing: 2px; }
  .highlight::before { content: '★ '; }
  .memory { color: #88ffcc; }
  .memory::before { content: '◈ MEMORIA: '; color: var(--green-dim); }
  .code { color: #aaffcc; font-size: 0.85rem; opacity: 0.8; }
  .code::before { content: '  > '; color: #336644; }
  .blank { display: block; height: 0.8em; opacity: 1 !important; }
  .progress-block { opacity: 0; animation: fadeIn 0.08s forwards; margin: 3px 0; }
  .progress-label { color: var(--green-dim); font-size: 0.8rem; margin-bottom: 2px; }
  .progress-bar-wrap { display: flex; align-items: center; gap: 10px; }
  .p-bar { flex: 1; height: 5px; background: #001a08; border: 1px solid #003311; overflow: hidden; max-width: 280px; }
  .p-fill { height: 100%; background: linear-gradient(90deg, var(--green-dim), var(--green)); width: 0%; transition: width 1.4s ease; box-shadow: 0 0 6px var(--green); }
  .p-val { color: var(--green); font-size: 0.8rem; min-width: 35px; }
  .stats-grid { opacity: 0; animation: fadeIn 0.08s forwards; display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap: 10px; margin: 10px 0; }
  .stat-card { border: 1px solid #003322; padding: 10px; background: #010c06; text-align: center; }
  .stat-val { font-family: 'Orbitron', monospace; font-size: 1.3rem; color: var(--gold); text-shadow: 0 0 10px var(--gold); display: block; }
  .stat-lbl { font-size: 0.65rem; color: var(--green-dim); letter-spacing: 2px; margin-top: 4px; display: block; }
  .cipher-block { opacity: 0; animation: fadeIn 0.08s forwards; margin: 12px 0; padding: 14px; border: 1px solid #003322; background: #010c06; position: relative; overflow: hidden; }
  .cipher-block::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0,255,136,0.04), transparent); animation: scanSweep 3s ease-in-out infinite; }
  @keyframes scanSweep { 0%{left:-100%} 100%{left:100%} }
  .cipher-label { color: var(--green-dim); font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 8px; }
  .cipher-text { font-family: 'VT323', monospace; font-size: 1.5rem; color: var(--pink); text-shadow: 0 0 12px var(--pink); letter-spacing: 4px; word-break: break-all; }
  .cursor { display: inline-block; width: 8px; height: 1em; background: var(--green); animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 2px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .binary-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none; z-index: 0; opacity: 0.025; font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--green); display: flex; flex-wrap: wrap; }

  /* QUIZ */
  #quiz-section {
    display: none; margin-top: 20px; border: 1px solid var(--green-dim);
    padding: 25px; background: #010c06; position: relative; overflow: hidden; z-index: 1;
  }
  #quiz-section::before {
    content: ''; position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,255,136,0.03), transparent);
    animation: scanSweep 4s ease-in-out infinite;
  }
  .quiz-header { font-family: 'Orbitron', monospace; font-size: clamp(0.75rem, 2vw, 1rem); color: var(--cyan); letter-spacing: 4px; margin-bottom: 20px; text-shadow: 0 0 10px var(--cyan); }
  .quiz-question { display: none; animation: fadeIn 0.3s forwards; }
  .quiz-question.active { display: block; }
  .q-number { color: var(--green-dim); font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 8px; }
  .q-text { color: var(--white); font-size: 1rem; margin-bottom: 18px; line-height: 1.6; }
  .q-options { display: flex; flex-direction: column; gap: 10px; }
  .q-btn {
    background: transparent; border: 1px solid #003322; color: var(--green);
    font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; padding: 12px 16px;
    text-align: left; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .q-btn::before { content: '[ ] '; color: var(--green-dim); }
  .q-btn:hover { border-color: var(--green); background: rgba(0,255,136,0.05); text-shadow: 0 0 8px var(--green); }
  .q-btn.correct { border-color: var(--green); background: rgba(0,255,136,0.12); color: var(--green); animation: correctPulse 0.5s ease; }
  .q-btn.correct::before { content: '[✓] '; color: var(--green); }
  .q-btn.wrong { border-color: var(--red); background: rgba(255,68,68,0.08); color: var(--red); }
  .q-btn.wrong::before { content: '[✗] '; color: var(--red); }
  @keyframes correctPulse { 0%,100% { box-shadow: none; } 50% { box-shadow: 0 0 20px var(--green); } }
  .q-feedback { margin-top: 14px; font-size: 0.85rem; min-height: 1.5em; opacity: 0; transition: opacity 0.3s; }
  .q-feedback.visible { opacity: 1; }
  .q-feedback.ok { color: var(--green); }
  .q-feedback.ok::before { content: '[SYS] '; color: #006633; }
  .q-feedback.fail { color: var(--red); }
  .q-feedback.fail::before { content: '[ERR] '; color: #880000; }
  .quiz-progress { display: flex; gap: 6px; margin-bottom: 20px; }
  .q-dot { width: 20px; height: 4px; background: #003322; transition: background 0.3s; }
  .q-dot.done { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .q-dot.current { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }

  /* FINAL MESSAGE */
  #final-msg {
    display: none; text-align: center; padding: 40px 20px;
    border: 1px solid var(--pink); margin-top: 30px;
    background: rgba(255,110,180,0.03); position: relative; overflow: hidden; z-index: 1;
  }
  #final-msg::before {
    content: ''; position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: conic-gradient(from 0deg, transparent, rgba(255,110,180,0.05), transparent);
    animation: rotateSlow 10s linear infinite;
  }
  @keyframes rotateSlow { to { transform: rotate(360deg); } }
  .final-title { font-family: 'Orbitron', monospace; font-size: clamp(1.1rem, 3.5vw, 1.8rem); color: var(--pink); text-shadow: 0 0 20px var(--pink), 0 0 40px rgba(255,110,180,0.4); letter-spacing: 4px; margin-bottom: 20px; position: relative; z-index: 1; animation: pulsePink 2s ease-in-out infinite; }
  @keyframes pulsePink { 0%,100% { text-shadow: 0 0 20px var(--pink), 0 0 40px rgba(255,110,180,0.4); } 50% { text-shadow: 0 0 40px var(--pink), 0 0 80px rgba(255,110,180,0.6); } }
  .final-decoded { font-family: 'VT323', monospace; font-size: clamp(1.4rem, 4.5vw, 2.3rem); color: var(--gold); text-shadow: 0 0 20px var(--gold); letter-spacing: 5px; position: relative; z-index: 1; margin: 10px 0 25px; }
  .final-sub { font-size: 0.82rem; color: var(--green-dim); position: relative; z-index: 1; max-width: 500px; margin: 0 auto; line-height: 2.1; }
  .heart-rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 997; display: none; }
  .heart-particle { position: absolute; font-size: 1rem; opacity: 0; animation: fallHeart linear forwards; color: var(--pink); text-shadow: 0 0 8px var(--pink); }
  @keyframes fallHeart { 0%{opacity:0.8;transform:translateY(-20px) rotate(0deg)} 100%{opacity:0;transform:translateY(100vh) rotate(360deg)} }
  .glitch { animation: glitchAnim 6s infinite; }
  @keyframes glitchAnim {
    0%,90%,100%{transform:translate(0);filter:none}
    91%{transform:translate(-2px,1px);filter:hue-rotate(90deg)}
    92%{transform:translate(2px,-1px)}
    93%{transform:translate(0)}
    95%{transform:translate(1px,2px);filter:hue-rotate(-90deg)}
    96%{transform:translate(-1px,0)}
    97%{transform:translate(0);filter:none}
  }
</style>
</head>
<body>

<div class="binary-bg" id="binaryBg"></div>
<div class="heart-rain" id="heartRain"></div>

<!-- ===== ACCESS GATE ===== -->
<div id="access-gate">
  <div class="gate-label">◈ SISTEMA DETECTANDO IDENTIDAD ◈</div>

  <!-- ASCII Face -->
  <div id="ascii-face-container">
    <div id="scan-line"></div>
    <canvas id="ascii-face" width="320" height="260"></canvas>
  </div>

  <div class="gate-title">ANGIE_TELLEZ.exe</div>

  <div class="gate-form">
    <div class="gate-question">¿Fecha del B1M? (dd/mm/aa)</div>
    <div class="gate-input-wrap">
      <input class="gate-input" id="gateInput" type="text" placeholder="dd/mm/aa" maxlength="8" autocomplete="off" spellcheck="false" />
      <button class="gate-btn" id="gateBtn">INGRESAR</button>
    </div>
    <div class="gate-status" id="gateStatus"></div>
  </div>
</div>

<!-- ===== DECODING OVERLAY ===== -->
<div id="decoding-overlay">
  <div class="decode-title">DECODIFICANDO...</div>
  <div class="decode-lines" id="decodeLines"></div>
  <div id="decode-progress-bar"><div id="decode-progress-fill"></div></div>
  <div id="decode-pct">0%</div>
</div>

<!-- ===== BOOT ===== -->
<div id="boot-screen">
  <div class="boot-logo glitch">AMOR.SYS</div>
  <div class="boot-sub">INICIALIZANDO PROTOCOLO ANGIE_TELLEZ</div>
  <div class="boot-bar-container"><div class="boot-bar" id="bootBar"></div></div>
  <div class="boot-status" id="bootStatus">CARGANDO MEMORIAS... 0%</div>
</div>

<!-- TERMINAL -->
<div id="terminal">
  <div class="terminal-header">
    <div class="terminal-dots">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
    <div class="terminal-title">CRISTIAN_REPIZO@AMOR:~$ — ANGIE_TELLEZ.EXE</div>
    <div style="font-size:0.65rem;color:var(--green-dim);letter-spacing:2px;">v∞.LOVE</div>
  </div>
  <div id="output"></div>
  <div style="margin-top:8px;"><span class="cursor"></span></div>

  <!-- QUIZ -->
  <div id="quiz-section">
    <div class="quiz-header">◈ VERIFICACIÓN DE IDENTIDAD REQUERIDA ◈</div>
    <div class="quiz-progress" id="quizProgress"></div>
    <div id="quizContainer"></div>
  </div>

  <!-- FINAL -->
  <div id="final-msg">
    <div class="final-title">✦ MENSAJE DESCIFRADO ✦</div>
    <div class="final-decoded" id="finalDecoded"></div>
    <div class="final-sub" id="finalSub"></div>
  </div>
</div>

<script>
// ===== BINARY BG =====
const binaryBg = document.getElementById('binaryBg');
for(let i=0;i<1800;i++){
  const s=document.createElement('span');
  s.textContent=Math.random()>.5?'1':'0';
  s.style.cssText=`display:inline-block;padding:2px;animation:bF ${3+Math.random()*5}s ease-in-out ${Math.random()*5}s infinite alternate;`;
  binaryBg.appendChild(s);
}
const bfSt=document.createElement('style');
bfSt.textContent='@keyframes bF{0%{opacity:0}50%{opacity:1}100%{opacity:0}}';
document.head.appendChild(bfSt);

// ===== ASCII FACE =====
// Detailed ASCII portrait based on the photo: girl with glasses, hoop earrings, holding roses
// Draw portrait on canvas with hacker aesthetic
const canvas = document.getElementById('ascii-face');
canvas.style.opacity = '0';
canvas.style.transition = 'opacity 1.2s ease';
const ctx = canvas.getContext('2d');

function drawPortrait() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  
  // Background
  ctx.fillStyle = '#010804';

async function startTerminal(){
  let cumDelay=0;
  for(let i=0;i<termScript.length;i++){
    const item=termScript[i];
    cumDelay+=item.delay||50;
    if(item.type==='stats'){
      await new Promise(r=>setTimeout(r,cumDelay));
      renderStats(); cumDelay=0;
      await new Promise(r=>setTimeout(r,400));
      continue;
    }
    if(item.type==='quiz'){
      await new Promise(r=>setTimeout(r,cumDelay));
      startQuiz(); cumDelay=0;
      break;
    }
    setTimeout((t,tx)=>{
      renderLine(t,tx);
      window.scrollTo(0,document.body.scrollHeight);
    },cumDelay,item.type,item.text);
  }
}

function renderLine(type,text){
  if(type==='blank'){
    const el=document.createElement('span');
    el.className='blank'; output.appendChild(el); return;
  }
  const el=document.createElement('span');
  el.className=type;
  if(type==='love'||type==='highlight'||type==='memory'){
    el.style.opacity='1';
    const prefix=type==='love'?'♥ ':type==='highlight'?'★ ':'◈ MEMORIA: ';
    let i=0;
    const iv=setInterval(()=>{
      el.textContent=prefix+text.substring(0,i);
      i++;
      if(i>text.length) clearInterval(iv);
    },22);
  } else {
    el.textContent=text;
  }
  output.appendChild(el);
}

  q.opts.forEach((opt,oi)=>{
    const btn=document.createElement('button');
    btn.className='q-btn';
    btn.textContent=opt;
    btn.onclick=()=>answerQuestion(idx,oi,btn,opts);
    opts.appendChild(btn);
  });
  window.scrollTo(0,document.body.scrollHeight);
}

function answerQuestion(qIdx,chosenIdx,btn,optsEl){
  const q=questions[qIdx];
  const isCorrect=chosenIdx===q.correct;
  const allBtns=optsEl.querySelectorAll('.q-btn');
  allBtns.forEach(b=>b.disabled=true);
  btn.classList.add(isCorrect?'correct':'wrong');
  if(!isCorrect){ allBtns[q.correct].classList.add('correct'); }
  if(isCorrect) score++;
  const fb=document.getElementById('fb'+qIdx);
  fb.textContent=isCorrect?q.okMsg:q.failMsg;
  fb.className='q-feedback visible '+(isCorrect?'ok':'fail');
  updateProgress(qIdx,isCorrect);
  setTimeout(()=>{
    currentQ++;
    if(currentQ<questions.length){ showQuestion(currentQ); window.scrollTo(0,document.body.scrollHeight); }
    else { finishQuiz(); }
  },2000);
}

function finishQuiz(){
  const qs=document.getElementById('quiz-section');
  setTimeout(()=>{
    qs.innerHTML='';
    const result=document.createElement('div');
    const pct=Math.round((score/questions.length)*100);
    result.innerHTML=`
      <div style="color:var(--cyan);font-family:'Orbitron',monospace;font-size:0.9rem;letter-spacing:3px;margin-bottom:15px;">◈ RESULTADO DE VERIFICACIÓN ◈</div>
      <div style="color:var(--green);margin-bottom:10px;">[SYS] Preguntas correctas: ${score}/${questions.length}</div>
      <div style="color:var(--green);margin-bottom:10px;">[SYS] Puntuación: ${pct}%</div>
      <div style="color:var(--green-dim);font-size:0.8rem;margin-bottom:20px;">${pct>=60?'[ACCESO CONCEDIDO] Identidad verificada — eres la persona correcta.':'[ACCESO PARCIAL] Sigue siendo para ti — solo él conoce todos los detalles.'}</div>
    `;
    qs.appendChild(result);
    startFinalDecrypt();
  },500);
}

function startFinalDecrypt(){
  const qs=document.getElementById('quiz-section');
  setTimeout(()=>{
    const line1=document.createElement('span');
    line1.className='prompt';
    line1.textContent='decrypt --archivo=mensaje_final.enc --clave=amor_real';
    qs.appendChild(line1);
    const br=document.createElement('span'); br.className='blank'; qs.appendChild(br);
    const s1=document.createElement('span'); s1.className='system'; s1.textContent='Iniciando protocolo de descifrado...'; qs.appendChild(s1);
    const br2=document.createElement('span'); br2.className='blank'; qs.appendChild(br2);

    const progs=[
      {label:'Decodificando sentimientos',val:97},
      {label:'Verificando autenticidad del amor',val:100},
      {label:'Compilando mensaje final',val:100}
    ];
    progs.forEach((p,pi)=>{
      setTimeout(()=>{
        const pb=document.createElement('div'); pb.className='progress-block';
        const uid='pf'+Math.random().toString(36).substr(2,4);
        pb.innerHTML=`<div class="progress-label">${p.label}</div><div class="progress-bar-wrap"><div class="p-bar"><div class="p-fill" id="${uid}"></div></div><span class="p-val" id="pv${uid}">0%</span></div>`;
        qs.appendChild(pb);
        setTimeout(()=>{
          const fill=document.getElementById(uid); const val=document.getElementById('pv'+uid);
          if(fill){ fill.style.width=p.val+'%'; }
          let cur=0;
          const iv=setInterval(()=>{ cur=Math.min(cur+3,p.val); if(val) val.textContent=cur+'%'; if(cur>=p.val) clearInterval(iv); },30);
        },100);
        window.scrollTo(0,document.body.scrollHeight);
      },pi*700);
    });

    setTimeout(()=>{
      const cb=document.createElement('div'); cb.className='cipher-block';
      const cMsg='cGFzZSBsbyBxdWUgcGFzZSwgc2llbXByZSBzZXJlbW9z';
      const finalMsg='PASE LO QUE PASE, SIEMPRE SEREMOS';
      cb.innerHTML=`<div class="cipher-label">◈ MENSAJE CIFRADO DETECTADO ◈</div><div class="cipher-text" id="cipherTxt">${cMsg}</div>`;
      qs.appendChild(cb);
      window.scrollTo(0,document.body.scrollHeight);
      setTimeout(()=>{
        const ct=document.getElementById('cipherTxt');
        let prog=0;
        const iv=setInterval(()=>{
          prog++;
          const rev=Math.floor((prog/40)*finalMsg.length);
          const revealed=finalMsg.substring(0,rev);
          const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=';
          const rest=Array(finalMsg.length-rev).fill(0).map(()=>chars[Math.floor(Math.random()*chars.length)]).join('');
          if(ct) ct.textContent=revealed+rest;
          if(prog>=40){ if(ct) ct.textContent=finalMsg; clearInterval(iv); setTimeout(showFinal,1200); }
        },80);
      },600);
    },2500);
  },400);
}

function showFinal(){
  const finalDiv=document.getElementById('final-msg');
  finalDiv.style.display='block';
  const msg='PASE LO QUE PASE, SIEMPRE SEREMOS';
  const decoded=document.getElementById('finalDecoded');
  let i=0;
  const iv=setInterval(()=>{
    decoded.textContent=msg.substring(0,i)+(i<msg.length?'█':'');
    i++;
    if(i>msg.length){ decoded.textContent=msg; clearInterval(iv); }
  },55);
  document.getElementById('finalSub').innerHTML=`
    <br>
    Desde el noveno grado hasta hoy.<br>
    Desde Neiva hasta Bogotá — 299 km que nunca fueron obstáculo.<br>
    Desde el primer beso en el colegio hasta la medianoche del 24 de diciembre.<br>
    Desde Toby, Chispas y Perla hasta los viajes juntos.<br><br>
    <span style="color:var(--pink)">— No me olvido de nada, cielo. —</span><br><br>
    <span style="color:var(--green-dim);font-size:0.72rem;letter-spacing:3px;">
      Firmado: CRISTIAN_REPIZO<br>
      Fecha: 09/12/2023 → ∞<br>
      Sistema: AMOR.SYS v∞
    </span>
  `;
  startHeartRain();
  finalDiv.scrollIntoView({behavior:'smooth'});
}

function startHeartRain(){
  const c=document.getElementById('heartRain');
  c.style.display='block';
  const syms=['♥','♡','❤','💚','✦','★','🐾'];
  for(let burst=0;burst<6;burst++){
    setTimeout(()=>{
      for(let i=0;i<18;i++){
        setTimeout(()=>{
          const h=document.createElement('span');
          h.className='heart-particle';
          h.textContent=syms[Math.floor(Math.random()*syms.length)];
          h.style.left=Math.random()*100+'vw';
          h.style.top='-30px';
          const dur=3+Math.random()*4;
          h.style.animationDuration=dur+'s';
          h.style.fontSize=(0.7+Math.random()*1.2)+'rem';
          h.style.animationDelay=Math.random()*2+'s';
          c.appendChild(h);
          setTimeout(()=>h.remove(),(dur+3)*1000);
        },i*90);
      }
    },burst*1600);
  }
}
</script>
